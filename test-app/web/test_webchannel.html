<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WebChannel test page</title>
  <style>
    body {
      margin: 0;
      padding: 64px 16px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #141414;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 16px;
    }
    code {
      background: #f0f2f8;
      border-radius: 4px;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>WebChannel test UI</h2>
    <p>
      This page is loaded from Qt resources. The user script
      <code>test_script.js</code> connects to WebChannel and draws the overlay.
    </p>
    <p>
      Use top controls in QML or the button in the page corner to validate
      <strong>QML -> JS</strong> and <strong>JS -> QML</strong>.
    </p>
  </div>
</body>
</html>
